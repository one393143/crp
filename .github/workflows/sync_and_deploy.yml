name: Kintone Sync and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  schedule:
    # 每周日凌晨 00:00 UTC (星期天早上 08:00 台北時間)
    - cron: '0 0 * * 0'
  workflow_dispatch: # 允許手動觸發


permissions:
  contents: write

jobs:
  sync_and_deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Kintone Sync
      env:
        KINTONE_DOMAIN: ${{ secrets.KINTONE_DOMAIN }}
        KINTONE_TOKEN_71: ${{ secrets.KINTONE_TOKEN_71 }}
        KINTONE_TOKEN_69: ${{ secrets.KINTONE_TOKEN_69 }}
        KINTONE_TOKEN_310: ${{ secrets.KINTONE_TOKEN_310 }}
      run: |
        python kintone_v2.py --sync

    - name: Export Static API Data
      run: |
        python export_static.py

    - name: Build Deploy Package
      run: |
        mkdir dist
        touch dist/.nojekyll
        cp index.html dist/
        cp -r api dist/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
